    <tspan x="862" y="15">Σ</tspan><tspan x="862" dy="16">4</tspan><tspan x="862" dy="16">Ψ</tspan>
    <tspan x="862" dy="16">C</tspan><tspan x="862" dy="16">1</tspan><tspan x="862" dy="16">Ω</tspan>
    <tspan x="862" dy="16">8</tspan><tspan x="862" dy="16">6</tspan><tspan x="862" dy="16">3</tspan>
    <tspan x="862" dy="16">F</tspan><tspan x="862" dy="16">Λ</tspan>
  </text>

  <!-- col right 5 x=888 -->
  <text font-family="'Courier New',monospace" font-size="13" fill="#00ff88" opacity="0.5">
    <animate attributeName="opacity" values="0.6;1;0.4;0.7;0.6" dur="2.2s" repeatCount="indefinite" begin="1.5s"/>
    <tspan x="888" y="24">D</tspan><tspan x="888" dy="16">9</tspan><tspan x="888" dy="16">Φ</tspan>
    <tspan x="888" dy="16">A</tspan><tspan x="888" dy="16">2</tspan><tspan x="888" dy="16">7</tspan>
    <tspan x="888" dy="16">Σ</tspan><tspan x="888" dy="16">E</tspan><tspan x="888" dy="16">5</tspan>
    <tspan x="888" dy="16">B</tspan>
