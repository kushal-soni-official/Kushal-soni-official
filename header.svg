<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 190" width="100%" preserveAspectRatio="xMidYMid meet">

  <!-- Background -->
  <rect width="900" height="190" fill="#050510"/>

  <!-- === MATRIX RAIN COLUMNS — LEFT ZONE === -->

  <!-- col 1 x=12 -->
  <text font-family="'Courier New',monospace" font-size="13" fill="#00ff88">
    <animate attributeName="opacity" values="0.6;1;0.4;0.8;0.6" dur="2.3s" repeatCount="indefinite"/>
    <tspan x="12" y="18">1</tspan><tspan x="12" dy="16">Ψ</tspan><tspan x="12" dy="16">0</tspan>
    <tspan x="12" dy="16">F</tspan><tspan x="12" dy="16">A</tspan><tspan x="12" dy="16">3</tspan>
    <tspan x="12" dy="16">Φ</tspan><tspan x="12" dy="16">7</tspan><tspan x="12" dy="16">B</tspan>
    <tspan x="12" dy="16">2</tspan><tspan x="12" dy="16">C</tspan>
  </text>

  <!-- col 2 x=38 -->
  <text font-family="'Courier New',monospace" font-size="13" fill="#00ff88" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.7;0.5;1;0.3" dur="3.1s" repeatCount="indefinite" begin="0.4s"/>
    <tspan x="38" y="30">9</tspan><tspan x="38" dy="16">D</tspan><tspan x="38" dy="16">Λ</tspan>
    <tspan x="38" dy="16">6</tspan><tspan x="38" dy="16">4</tspan><tspan x="38" dy="16">Σ</tspan>
    <tspan x="38" dy="16">8</tspan><tspan x="38" dy="16">5</tspan><tspan x="38" dy="16">π</tspan>
    <tspan x="38" dy="16">E</tspan>
  </text>

  <!-- col 3 x=62 -->
  <text font-family="'Courier New',monospace" font-size="13" fill="#00ff88">
    <animate attributeName="opacity" values="0.8;0.3;0.9;0.4;0.8" dur="1.9s" repeatCount="indefinite" begin="0.8s"/>
    <tspan x="62" y="10">Ω</tspan><tspan x="62" dy="16">2</tspan><tspan x="62" dy="16">7</tspan>
    <tspan x="62" dy="16">C</tspan><tspan x="62" dy="16">Ψ</tspan><tspan x="62" dy="16">1</tspan>
    <tspan x="62" dy="16">0</tspan><tspan x="62" dy="16">A</tspan><tspan x="62" dy="16">F</tspan>
    <tspan x="62" dy="16">Λ</tspan><tspan x="62" dy="16">3</tspan>
  </text>

  <!-- col 4 x=88 -->
  <text font-family="'Courier New',monospace" font-size="13" fill="#00ff88" opacity="0.6">
    <animate attributeName="opacity" values="0.4;0.9;0.3;0.7;0.4" dur="2.7s" repeatCount="indefinite" begin="1.2s"/>
    <tspan x="88" y="22">5</tspan><tspan x="88" dy="16">Φ</tspan><tspan x="88" dy="16">8</tspan>
    <tspan x="88" dy="16">D</tspan><tspan x="88" dy="16">Σ</tspan><tspan x="88" dy="16">4</tspan>
    <tspan x="88" dy="16">9</tspan><tspan x="88" dy="16">E</tspan><tspan x="88" dy="16">1</tspan>
    <tspan x="88" dy="16">6</tspan>
  </text>

  <!-- col 5 x=114 -->
  <text font-family="'Courier New',monospace" font-size="13" fill="#00ff88">
    <animate attributeName="opacity" values="0.7;0.2;0.8;0.5;0.7" dur="2.1s" repeatCount="indefinite" begin="0.2s"/>
    <tspan x="114" y="14">B</tspan><tspan x="114" dy="16">3</tspan><tspan x="114" dy="16">Ω</tspan>
    <tspan x="114" dy="16">7</tspan><tspan x="114" dy="16">F</tspan><tspan x="114" dy="16">Λ</tspan>
    <tspan x="114" dy="16">2</tspan><tspan x="114" dy="16">C</tspan><tspan x="114" dy="16">5</tspan>
    <tspan x="114" dy="16">9</tspan><tspan x="114" dy="16">A</tspan>
  </text>

  <!-- col 6 x=140 (fading toward center) -->
  <text font-family="'Courier New',monospace" font-size="13" fill="#00ff88" opacity="0.08">
    <tspan x="140" y="20">4</tspan><tspan x="140" dy="16">Σ</tspan><tspan x="140" dy="16">0</tspan>
    <tspan x="140" dy="16">8</tspan><tspan x="140" dy="16">Ψ</tspan><tspan x="140" dy="16">6</tspan>
    <tspan x="140" dy="16">D</tspan><tspan x="140" dy="16">1</tspan><tspan x="140" dy="16">E</tspan>
  </text>

  <!-- === MATRIX RAIN COLUMNS — RIGHT ZONE === -->

  <!-- col right 1 x=760 (fading toward center) -->
  <text font-family="'Courier New',monospace" font-size="13" fill="#00ff88" opacity="0.08">
    <tspan x="760" y="25">3</tspan><tspan x="760" dy="16">Φ</tspan><tspan x="760" dy="16">A</tspan>
    <tspan x="760" dy="16">9</tspan><tspan x="760" dy="16">Λ</tspan><tspan x="760" dy="16">7</tspan>
    <tspan x="760" dy="16">B</tspan><tspan x="760" dy="16">2</tspan><tspan x="760" dy="16">5</tspan>
  </text>

  <!-- col right 2 x=810 -->
  <text font-family="'Courier New',monospace" font-size="13" fill="#00ff88">
    <animate attributeName="opacity" values="0.5;0.9;0.3;0.7;0.5" dur="2.5s" repeatCount="indefinite" begin="0.6s"/>
    <tspan x="810" y="18">Ω</tspan><tspan x="810" dy="16">1</tspan><tspan x="810" dy="16">C</tspan>
    <tspan x="810" dy="16">Σ</tspan><tspan x="810" dy="16">6</tspan><tspan x="810" dy="16">F</tspan>
    <tspan x="810" dy="16">4</tspan><tspan x="810" dy="16">Ψ</tspan><tspan x="810" dy="16">8</tspan>
    <tspan x="810" dy="16">3</tspan><tspan x="810" dy="16">D</tspan>
  </text>

  <!-- col right 3 x=836 -->
  <text font-family="'Courier New',monospace" font-size="13" fill="#00ff88" opacity="0.6">
    <animate attributeName="opacity" values="0.8;0.3;1;0.5;0.8" dur="1.8s" repeatCount="indefinite" begin="1.0s"/>
    <tspan x="836" y="32">7</tspan><tspan x="836" dy="16">A</tspan><tspan x="836" dy="16">Λ</tspan>
    <tspan x="836" dy="16">2</tspan><tspan x="836" dy="16">E</tspan><tspan x="836" dy="16">9</tspan>
    <tspan x="836" dy="16">Φ</tspan><tspan x="836" dy="16">5</tspan><tspan x="836" dy="16">B</tspan>
