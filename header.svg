  <!-- === NEON BORDER LINES TOP & BOTTOM === -->
  <line x1="0" y1="1" x2="900" y2="1" stroke="#00ff88" stroke-width="2">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
  </line>
  <line x1="0" y1="188" x2="900" y2="188" stroke="#00ff88" stroke-width="2">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
  </line>

  <!-- Corner accents -->
  <line x1="0" y1="1" x2="60" y2="1" stroke="#ff003c" stroke-width="2" opacity="0.7"/>
  <line x1="0" y1="1" x2="0" y2="40" stroke="#ff003c" stroke-width="2" opacity="0.7"/>
  <line x1="900" y1="1" x2="840" y2="1" stroke="#ff003c" stroke-width="2" opacity="0.7"/>
  <line x1="900" y1="1" x2="900" y2="40" stroke="#ff003c" stroke-width="2" opacity="0.7"/>
  <line x1="0" y1="188" x2="60" y2="188" stroke="#ff003c" stroke-width="2" opacity="0.7"/>
  <line x1="0" y1="188" x2="0" y2="148" stroke="#ff003c" stroke-width="2" opacity="0.7"/>
  <line x1="900" y1="188" x2="840" y2="188" stroke="#ff003c" stroke-width="2" opacity="0.7"/>
  <line x1="900" y1="188" x2="900" y2="148" stroke="#ff003c" stroke-width="2" opacity="0.7"/>

  <!-- === KUSHAL SONI — LAYERED GLOW SIMULATION (no filter needed) === -->

  <!-- Outer glow layer 1 (large blur sim) -->
  <text x="450" y="108" text-anchor="middle"
        font-family="'Courier New',Courier,monospace"
        font-size="66" font-weight="900" fill="#00ff88" opacity="0.04">KUSHAL SONI</text>
  <text x="447" y="105" text-anchor="middle"
        font-family="'Courier New',Courier,monospace"
        font-size="66" font-weight="900" fill="#00ff88" opacity="0.06">KUSHAL SONI</text>
  <text x="453" y="111" text-anchor="middle"
        font-family="'Courier New',Courier,monospace"
        font-size="66" font-weight="900" fill="#00ff88" opacity="0.06">KUSHAL SONI</text>

  <!-- Mid glow layer -->
  <text x="449" y="107" text-anchor="middle"
        font-family="'Courier New',Courier,monospace"
        font-size="66" font-weight="900" fill="#00ff88" opacity="0.12">KUSHAL SONI</text>
  <text x="451" y="109" text-anchor="middle"
        font-family="'Courier New',Courier,monospace"
        font-size="66" font-weight="900" fill="#00ff88" opacity="0.12">KUSHAL SONI</text>
  <text x="450" y="107" text-anchor="middle"
        font-family="'Courier New',Courier,monospace"
        font-size="66" font-weight="900" fill="#00ff88" opacity="0.12">KUSHAL SONI</text>
  <text x="450" y="109" text-anchor="middle"
        font-family="'Courier New',Courier,monospace"
        font-size="66" font-weight="900" fill="#00ff88" opacity="0.12">KUSHAL SONI</text>

  <!-- MAIN TEXT — animated pulse -->
  <text x="450" y="108" text-anchor="middle"
        font-family="'Courier New',Courier,monospace"
        font-size="66" font-weight="900" fill="#00ff88">
    KUSHAL SONI
    <animate attributeName="opacity" values="0.92;1;0.95;1;0.92" dur="3s" repeatCount="indefinite"/>
  </text>

  <!-- === SUBTITLE === -->
  <text x="450" y="150" text-anchor="middle"
        font-family="'Courier New',Courier,monospace"
        font-size="13" fill="#00ff88" letter-spacing="3">
    [ CYBERSECURITY · AI SECURITY · ETHICAL HACKER ]
    <animate attributeName="opacity" values="0.45;0.7;0.45" dur="4s" repeatCount="indefinite"/>
  </text>

  <!-- Scanning line effect -->
  <rect x="0" y="0" width="900" height="1" fill="#00ff88" opacity="0.25">
    <animate attributeName="y" values="-2;192;-2" dur="5s" repeatCount="indefinite" calcMode="linear"/>
    <animate attributeName="opacity" values="0;0.3;0.3;0" dur="5s" repeatCount="indefinite"/>
  </rect>

</svg>
